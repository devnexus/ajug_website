source: ''
paths:
  static: ''
  uploads: uploads
  uploads_use_relative_path: false
  dam_uploads: ''
  dam_static: ''
  data: _data
  collections: _posts
  layouts: _layouts
collections_config:
collections_config:
  meetups:
    path: _data/meetups.yml
    name: Upcoming Meetups
    icon: event
    # This tells CloudCannon this is a single file, not a folder
    parser: yaml
  data:
    path: _data
    output: false
    auto_discovered: true
    _enabled_editors:
      - data
  posts:
    path: _posts
    name: Events
    icon: event_available
    disable_url: true
    description: ''
    preview:
      text:
        '-key': title
      subtext:
        '-key': date
      image:
        type: image
        cascade: true
        required: false
        placeholder: marketing image link
      pattern: (?i)\.(jpe?g|png|svg)$
      pattern_message: Please select an image file
      title:
        type: text
        cascade: true
        required: true
        placeholder: Event Title
    _inputs:
      registration:
        type: url
        placeholder: https://luma.com/ajug
      image:
        type: image
        options:
          paths:
            uploads: /assets/img/meetups
            uploads_filename:
            uploads_use_relative_path:
            static:
            dam_uploads:
            dam_uploads_filename:
            dam_static:
          mime_type:
          accepts_mime_types:
            - image/svg+xml
            - image/png
            - image/jpeg
            - image/svg+xml
            - image/png
            - image/jpeg
          empty_type:
          resize_style:
          width: 1600
          height: 1200
          expandable:
          allowed_sources:
            - uploads
            - existing
            - url
          prevent_resize_existing_files:
          sizes:
        cascade: true
    create:
      path: >-
        [relative_base_path]/{date|year}-{date|month}-{date|day}-{title|slugify}.[ext]
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false

data_config: {}
collection_groups:
  - heading: Pages
    collections:
      - pages
  - heading: Content
    collections:
      - posts
_enabled_editors: null
_inputs:
  date:
    type: date
  time:
    type: text
  title:
    type: text
  link:
    type: url
  image:
    type: image
    options:
      uploads_dir: /assets/img
  meetup_image_path:
    type: image
    uploads_dir: /assets/img/meetups
  meetup_link:
    type: url
  categories:
    type: multiselect
    options:
      allow_create: true
  tags:
    type: multiselect
    options:
      allow_create: true
  meetup_image_path:
    type: image
    options:
      uploads_dir: /assets/img/meetups
  sponsor_image_path:
    type: image
    options:
      uploads_dir: /assets/img/sponsors
      width: 300
      height: 300
      resize_style: cover
      mime_type: image/jpeg
      expandable: false
_select_data:
  sass:
    sass_dir: _sass
_structures: 
  meetup_item:
    values:
      - label: New Meetup
        value:
          date: 
          title: 
          meetup_link:
          meetup_image_path:
_editables: {}
commit_templates: []
base_url: ''
editor: null
source_editor: null
timezone: Etc/UTC
