source: ''
paths:
  static: ''
  uploads: uploads
  uploads_use_relative_path: false
  dam_uploads: ''
  dam_static: ''
  data: _data
  collections: ''
  layouts: _layouts
collections_config:
collections_config:
  meetups:
    path: _data/meetups.yml
    name: Upcoming Meetups
    icon: event
    # This tells CloudCannon this is a single file, not a folder
    parser: yaml
  data:
    path: _data
    output: false
    auto_discovered: true
    _enabled_editors:
      - data
data_config:
  events:
    path: _data/meetups.yml
    _enabled_editors:
      - data
collection_groups:
  - heading: Pages
    collections:
      - pages
_enabled_editors: null
_inputs:
  date:
    type: date
  time:
    type: text
  title:
    type: text
  link:
    type: url
  image:
    type: image
    options:
      uploads_dir: /assets/img
  meetup_image_path:
    type: image
    uploads_dir: /assets/img/meetups
  meetup_link:
    type: url
  categories:
    type: multiselect
    options:
      allow_create: true
  tags:
    type: multiselect
    options:
      allow_create: true
  meetup_image_path:
    type: image
    options:
      uploads_dir: /assets/img/meetups
  sponsor_image_path:
    type: image
    options:
      uploads_dir: /assets/img/sponsors
      width: 300
      height: 300
      resize_style: cover
      mime_type: image/jpeg
      expandable: false
_select_data:
  sass:
    sass_dir: _sass
_structures: 
  meetup_item:
    values:
      - label: New Meetup
        value:
          date: 
          title: 
          meetup_link:
          meetup_image_path:
_editables: {}
commit_templates: []
base_url: ''
editor: null
source_editor: null
timezone: Etc/UTC
